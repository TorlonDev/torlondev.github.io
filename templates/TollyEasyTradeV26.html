        function findPercent2Points(max_price, min_price) {
            const max = parseFloat(max_price); const min = parseFloat(min_price);
            const percent = 100 - ((min / max) * 100)
            return percent
        }
        function findMaxFromPercent(min_price, percent) {
            const min = parseFloat(min_price); const p = parseFloat(percent);
            return parseFloat(min * (100 + p) / 100)
        }
        function findMinFromPercent(max_price, percent) {
            const max = parseFloat(max_price); const p = parseFloat(percent);
            return parseFloat((max * (100 - p)) / 100)
        }
        function castNumDayToAbbr(dateObj) {
            const numDay = dateObj.getDay()
            const arrDayAbbr = ['Sun', 'Mon', 'Tue', 'Wed', 'Thr', 'Fri', 'Sat', 'Sun']
            return arrDayAbbr[numDay]
        }
        function formatUnixDate(ms) {
            const date = new Date(ms);
            const yyyy = date.getFullYear();
            const MM = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            const hh = String(date.getHours()).padStart(2, '0');
            const mm = String(date.getMinutes()).padStart(2, '0');
            const ss = String(date.getSeconds()).padStart(2, '0');
            const dayStr = castNumDayToAbbr(date)
            return `${yyyy}-${MM}-${dd} ${hh}:${mm} | ${dayStr}`;
        }

        /* Example 1.5 -> 1.4 / 0.000278 -> 0.000277 / 25 -> 24 */
        function floorDownBySelfPrecision(str) {
            const parts = str.split(".");
            const decimals = parts[1] ? parts[1].length : 0;
            // Calculate Step - 1, 0.001, 0.000001
            const step = Math.pow(10, -decimals);
            // sub by step
            const result = parseFloat(str) - step;
            // convert to str and change decimal back
            return result.toFixed(decimals);
        }

            if (rand < min || rand > max) {

            }
            return rand
        }

        function checkExchangeInfo(cb = () => { }) {
            openModal('Get Exchange Info')

            $.ajax({
                type: 'GET',
                url: `${binance_api_url}/fapi/v1/exchangeInfo`,
                contentType: "application/json; charset=utf-8",
                success: function (result) {
                    const { symbols = [] } = result
                    // console.log(result)

                    symbols.forEach(({ symbol, quantityPrecision = 0, /*pricePrecision = 1,*/ status = "SETTLING", filters, onboardDate }) => {
                        if (status === "TRADING") {
                            if (!(symbol in positionListSymbolKey)) {
                                positionListSymbolKey[symbol] = {
                                    existLong: false,
                                    existShort: false,
                                    onboardDate,
                                    csv_oldday_order: 0,
                                    csv_oldday_percent: 0,
                                }
                            }

                            // No more use pricePrecision it is strange
                            // it is maximum decimal can send via API but it is not good for server tick
                            // And not follow decimal in UI
                            // But still get this in case can not find tickSize

                            // tickSize is proper than pricePrecision
                            // "1", "0.1" , "0.001", "0.0010" --> (buggy api)
                            // -> 0, 1 , 3, 3

                            let { tickSize = undefined } = filters[0]

                            if (!tickSize) {
                                alert("Cannot find tickSize of " + sym)
                                return;
                            }

                            // Override pricePrecision with tickSize
                            pricePrecision = 1

                            if (tickSize === "1" || !tickSize.includes('.')) {
                                pricePrecision = 0 // !!!
                            } else {
                                const strAfterPoint = tickSize.split('.')[1]

                                for (let i = 0; i < strAfterPoint.length; i++) {
                                    if (strAfterPoint[i] !== '0') {
                                        break
                                    }
                                    pricePrecision += 1
                                }
                            }

                            positionListSymbolKey[symbol] = {
                                ...positionListSymbolKey[symbol],
                                quantityPrecision,
                                tickSize,

                                // Normally Every Price Always Precision except 'YFI'
                                // YFI API Allow Precision = 1 but will send 0 instead (follow tickSize)
                                pricePrecision,

                            }
                        }
                    })


                    closeModal()
                    cb()
                },
                error: function (err) {
                    alert("error - cannot connect binance api - exchangeInfo")
                    console.log("error - cannot connect binance api - exchangeInfo")
                    console.log(err)
                    closeModal()
                }
            });
        }

        function checkAvailableBalanceAndExistPosition(cb = () => { }) {
            const endPoint = `/fapi/v2/account?`
            const ts = Date.now()
            const qs = `recvWindow=10000&timestamp=${ts}`

            openModal('Checking Balance...')
            $.ajax({
                type: 'GET',
                url: `${binance_api_url}${endPoint}${qs}&signature=${binanceSignatureSign(qs)}`,
                success: function (result) {
                    const { availableBalance = undefined, positions = [], } = result

                    if (availableBalance === undefined) {
                        alert("Fail to get Available Balance")
                        $('#available_balance').html('-')
                        return;
                    }

                    $('#available_balance').html(`<span style="color:${availableBalance > 0 ? 'lime' : 'red'};">${+availableBalance}</span>`)
                    isAlreadyCheckedBalance = true

                    for (let i = 0; i < positions.length; i++) {
                        const {
                            symbol = "USDT", positionSide = "LONG",
                            isolated = false, leverage = "20",
                            entryPrice = "0.0", positionAmt = "0.0", unrealizedProfit = "0.00000000",
                        } = positions[i]

                        positionListSymbolKey[symbol] = {
                            ...positionListSymbolKey[symbol],
                            marginType: isolated ? 'ISOLATED' : 'CROSS',
                            leverage
                        }

                        if (positionSide === "LONG" && entryPrice != 0) {
                            positionListSymbolKey[symbol].existLong = true
                            positionListSymbolKey[symbol].positionAmtLong = positionAmt
                            positionListSymbolKey[symbol].unrealizedProfitLong = unrealizedProfit
                        }

                        if (positionSide === "SHORT" && entryPrice != 0) {
                            positionListSymbolKey[symbol].existShort = true
                            positionListSymbolKey[symbol].positionAmtShort = positionAmt
                            positionListSymbolKey[symbol].unrealizedProfitShort = unrealizedProfit
                        }
                    }

                    closeModal()
                    cb()
                },
                error: function (err) {
                    console.log("Error get Available Balance")
                    console.log(err)

                    if ('msg' in err.responseJSON) {
                        alert(err.responseJSON.msg)
                    } else {
                        alert("Error get Available Balance")
                    }

                    closeModal()
                }
            });
        }

                            const batchClosePosition = [

                                    "positionSide": "LONG",
                                    "type": "MARKET",
                                    "quantity": `${positionAmtLong}`.replaceAll('-', ''),

                                    "positionSide": "SHORT",

                            const ts6 = Date.now()
                            const qs6 = `batchOrders=${encodeClosePosition}&recvWindow=10000&timestamp=${ts6}`

        function setLeverage(symbol, leverage = '4', cb = () => { }) {

            if (+leverage <= 0) {
                alert("Leverage <= 0: " + leverage)
                return
            }

            openModal(symbol + ": " + 'Adjust Leverage ... ' + leverage + 'x')

            const endPoint2 = '/fapi/v1/leverage?'
            const ts2 = Date.now()
            const qs2 = `symbol=${encodeURIComponent(symbol)}&leverage=${leverage}&timestamp=${ts2}`

            $.ajax({
                type: 'POST',
                url: `${binance_api_url}${endPoint2}${qs2}&signature=${binanceSignatureSign(qs2)}`,
                success: function (result) {
                    positionListSymbolKey[symbol].leverage = leverage
                    closeModal()
                    cb()
                },
                error: function (err) {
                    // console.log(err)
                    // leverage not suppose {"code":-4028,"msg":"Leverage 50 is not valid"}

                    if ('msg' in err.responseJSON) {

                        if (`${err.responseJSON.msg}`.includes('is not valid')) {
                            setLeverage(symbol, `${(+leverage - 10)}`, cb)
                            return
                        }

                        openModal(symbol + ": " + err.responseJSON.msg)
                    } else {
                        console.log("Error Adjust Leverage for " + symbol)
                        console.log(err)
                        alert("Error Adjust Leverage for " + symbol)
                    }
                }
            });

        }

                const [dateTime, dayStr] = formatUnixDate(onboardDate).split(' | ')
                const isNewCoin = onboardDate > timePageFirstLoad

                if (pricePrecision === undefined || !symbol.endsWith('USDT') || arr_no_trade.indexOf(symbol) !== -1) {
                    continue
                }

                const isExistPosition = (existLong || existShort) && isAlreadyCheckedBalance

                $('#tbody_percent_change_24h').append(`
                    <tr ${isNewCoin ? 'style="background-color: purple;"' : ''}>
                        <td></td>
                        <td style="width: 30px !important;" class="dt-type-date">${dateTime}</td>
                        <td style="width: 30px !important;">${dayStr}</td>
                        <td style="width: 30px !important;">${symbol}</td>
                        <td style="width: 28px !important;" class="dt-type-numeric">${parseFloat(priceChangePercent).toFixed(1)} %</td>
                        <td>
                            ${isExistPosition ? '.' : ''}
                            <button style="display: ${isExistPosition ? 'block' : 'none'};" id="close_order_${symbol}" onclick="closeOrderAndPosition('${symbol}')">Close</button>
                            ${isExistPosition ? '&nbsp;' : ''}
                            <button style="display: ${isAlreadyCheckedBalance ? 'block' : 'none'};" id="btn_trade_${symbol}" onclick="trade('${symbol}')">Trade</button>
                        </td>
                        <td class="dt-type-numeric">${csv_oldday_order}</td>
                        <td class="dt-type-numeric"></td>
                        <td class="dt-type-numeric">${csv_oldday_percent}</td>
                    </tr>
                `)
            }

            reInitailDataTable(4)
        }

        checkExchangeInfo(() => { checkPercentMarket(() => { refreshTable() }) })

        setInterval(() => {
            const now = new Date()
            const currentHour = now.getHours()
            const currentMinute = now.getMinutes()
            const currentSecond = now.getSeconds()
            // const currentMilliSecond = now.getMilliseconds()

            const formattedTime = `${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`
            $('#clock_time').html(formattedTime + ' Recommend :00-05')

            if((currentHour == 6 || currentHour == 3) && currentMinute == 51 && currentSecond <= 3){
                window.location.reload()
            }

            if(isAutoReportCSV7AM === false && (currentHour == 6 || currentHour == 3) && currentMinute == 52 && currentSecond <= 3){
                isAutoReportCSV7AM = true
                $('.buttons-csv').click()
                $('.buttons-pdf').click()
            }

        }, 400) // 1000 is lag 500 is not lag

    </script>

    <script id="csv" type="text/javascript">
        document.getElementById('csvFile').addEventListener('change', function (event) {
            openModal("Loading CSV...")
            const file = event.target.files[0];
            if (!file) {
                current_oldday_filename_csv = ''
                closeModal()
                return;
            }

            // console.log(file)

            current_oldday_filename_csv = file.name.replace(/.csv/g, '')

            const reader = new FileReader();

            reader.onload = function (e) {
                const text = e.target.result;

                const rows = text.split('\n');

                for (let i = 1; i < rows.length; i++) {
                   
                    let str = rows[i]
                    // console.log(str)
                    // '"1","PHAUSDT"\r'
                    // '"553","POWERUSDT","-79.6"\r'

                    let cleaned = str.replace(/\r/g, '')
                    let parts = cleaned.split(',');

                    let oldday_order = +(parts[0].replace(/"/g, '')) // 43
                    let symbol = (parts[1] || '').replace(/"/g, '') // FOLKSUSDT
                    let oldday_percent = +((parts[2] || '0').replace(/"/g, '')) // -79.6

                    if (symbol && symbol.includes('USDT')) {
                        if(positionListSymbolKey[symbol] === undefined){
                            positionListSymbolKey[symbol] = {}
                        }
                        // console.log(num, symbol)
                        positionListSymbolKey[symbol].csv_oldday_order = oldday_order
                        positionListSymbolKey[symbol].csv_oldday_percent = oldday_percent
                    }
                }
                counting_oldday_csv += 1

                refreshTable()
                closeModal()

                dataTable1.order([7, 'desc']).draw()
                $('.buttons-pdf').click()
            };

            reader.readAsText(file);
        });
    </script>
