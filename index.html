    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap");

  <script>
    const css_root = document.querySelector(':root')
    const css_root_white = getComputedStyle(css_root).getPropertyValue('--white')

    console.log('css_root_white', css_root_white)

    css_root.style.setProperty('--white', 'black')

    const css_root_white_rerender = getComputedStyle(css_root).getPropertyValue('--white')

    console.log('css_root_white_rerender', css_root_white_rerender)
    console.log('--------------')

    // 1. check local storage first
    // 2. check color scheme
    // window.matchMedia('(prefers-color-scheme: dark)').matches === true

    function setTheme(theme = 'light') {
      localStorage.setItem('torlondev_theme', theme)

      // Need rerender UI Logic here or use state of react instead
    }

    function getTheme() {
      //Theme -> dark, light (return )
      //localStorage Key -> torlondev_theme

      if (!localStorage.getItem('torlondev_theme')) {
        if (!window.matchMedia('(prefers-color-scheme: dark)').matches) {
          localStorage.setItem('torlondev_theme', 'light')
          return 'light'
        } else {
          localStorage.setItem('torlondev_theme', 'dark')
          return 'dark'
        }
      }

      // Support TailwindCSS
      // case - dark : document.documentElement.classList.add('dark')
      // case - light : document.documentElement.classList.remove('dark')

      return localStorage.getItem('torlondev_theme')
    }
  </script>
