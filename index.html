<!DOCTYPE html>
<html>

<head>
  <title>Torlon Dev V2</title>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=yes,width=device-width">
  <script type="text/ecmascript">
    srcAlter = path => {
      script = document.createElement('script')
      script.src = path
      document.head.append(script)
    }
    isBabelTransform = false;
  </script>
  <script src='https://torlondev.github.io/cdn/js/tailwindcss-3.4.5.min.js'
    onerror="srcAlter('cdn/js/tailwindcss-3.4.5.min.js')"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"
    onerror="srcAlter('cdn/js/react-18.2.0.min.js')"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"
    onerror="srcAlter('cdn/js/react-dom-18.2.0.min.js')"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-router-dom/5.3.4/react-router-dom.min.js"
    onerror="srcAlter('cdn/js/react-router-dom-5.3.4.min.js')"></script>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap");

    :root {
      /* constant variable */
      --navBarHeight: 60px;
      --navBarElementMaxWidth: 1100px;
      --sideBarWidth: 200px;
      --mobileMaxWidth: 649px;
      --desktopMinWidth: calc(var(--mobileMaxWidth) + 1px);
      /*Samsung Galaxy S8+*/
      --contentMinWidth: 360px;

      /* theme variable */
      --navBarBGColor: wheat;
      --navBarColor: black;
      --BGColor: white;
      --color: black;
      --linkColor: blue;
    }

    html,
    body {
      background-image: url('./v2/img/codingblack.gif');
      background-color: darkgrey;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: "Poppins", sans-serif;
    }

    .a_link {
      color: var(--linkColor) !important;
    }

    .wrapper_content {
      padding-top: var(--navBarHeight);
      margin: auto;
      min-width: var(--contentMinWidth);
      max-width: var(--navBarElementMaxWidth);
      min-height: 100vh;

      background-color: var(--BGColor);
      color: var(--color);
    }

    /* Mobile First */
    @media only screen and (max-width: 649px) {

      html,
      body {
        background-repeat: repeat;
        background-size: cover;
      }
    }

    /* Desktop Later */
    @media only screen and (min-width: 650px) {

      html,
      body {
        background-repeat: no-repeat;
        background-size: 100% 100%;
        background-attachment: fixed;
      }

      .hide_on_desktop {
        display: none;
      }
    }
  </style>

  <script type="text/babel">
    isBabelTransform = true;
  </script>

  <script type="text/babel">
    const mobileCSS = (styles = '') => `
    @media only screen and (max-width: 649px) {${styles}}
  `
    const desktopCSS = (styles = '') => `
    @media only screen and (min-width: 650px) {${styles}}
  `
    const setTheme = (themeSet = 'LIGHT') => {
      localStorage.setItem('THEME', (themeSet || 'LIGHT'))

      themeSet = themeSet.toLowerCase()
      /* Old Web */
      localStorage.setItem("defaultModeTheme", themeSet);

      ([
        { var: 'navBarBGColor', light: 'wheat', dark: 'darkslategrey' },
        { var: 'navBarColor', light: 'black', dark: 'white' },
        { var: 'BGColor', light: 'white', dark: 'black' },
        { var: 'color', light: 'black', dark: 'wheat' },
        { var: 'linkColor', light: 'blue', dark: 'green' },
      ]).forEach(el => {
        $(':root').css(`--${el.var}`, el[themeSet] || el.light)
      });
    }

    var theme = localStorage.getItem('THEME')

    if (!theme || !['LIGHT', 'DARK'].find(el => theme === el)) {
      theme = 'LIGHT'
      setTheme(theme)
    } else {
      setTheme(theme)
    }
  </script>

  <script type="text/babel">
    var objLanguage = {
      t_hello_world: { en: 'Hello World.', th: 'สวัสดีชาวโลก' },
      t_i_am_developer: { en: 'I am developer.', th: 'ผมคือนักพัฒนา' },
      t_cv: { en: 'CV', th: 'ซีวี' },
      t_blogs: { en: 'Blogs', th: 'บล็อก' },
      t_projects: { en: 'Projects', th: 'โปรเจค' },
    }

    var language = localStorage.getItem('LANGUAGE')

    if (!language) {
      localStorage.setItem('LANGUAGE', 'EN')
      language = 'EN'
    }
  </script>

  <script type="text/babel">
    const { useState, useContext } = React
    const Context = React.createContext({}) //leave empty do not pass anything
    const { Provider } = Context
    const { render } = ReactDOM
    const { HashRouter, NavLink, Route, Switch: Routes, useLocation } = ReactRouterDOM;
  </script>

  <script type="text/babel" src="./v2/components/00_Util.jsx"></script>
  <script type="text/babel" src="./v2/components/01_NavBar.jsx"></script>
  <script type="text/babel" src="./v2/components/02_Home.jsx"></script>
  <script type="text/babel" src="./v2/components/03_CV.jsx"></script>
  <script type="text/babel" src="./v2/components/04_Blogs.jsx"></script>
  <script type="text/babel" src="./v2/components/05_Life.jsx"></script>
  <script type="text/babel" src="./v2/components/05_Projects.jsx"></script>

  <script type="text/babel">
    const App = ({ children }) => {
      const [currentLanguage, setCurrentLanguage] = useState('EN')
      const [currentTheme, setCurrentTheme] = useState('LIGHT')

      return <Provider
        value={{
          objLanguage, currentLanguage, setCurrentLanguage,
          currentTheme, setCurrentTheme
        }}>
        {children}
      </Provider>
    }

    render(
      <App>
        <HashRouter>
          <Navbar />
        </HashRouter>
      </App>,
      document.getElementById("root")
    );
  </script>

</head>

<body>
  <div id="root"></div>
  <script>
    document.addEventListener("readystatechange", (event) => {
      if (event.target.readyState === "complete") {
        if (!isBabelTransform) { Babel.transformScriptTags(); }
      }
    })
  </script>
</body>

</html>
