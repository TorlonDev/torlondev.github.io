  <style>
    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap");

    :root {
      /* constant variable */
      --navBarHeight: 60px;
      --navBarElementMaxWidth: 1100px;
      --sideBarWidth: 210px;
      --mobileMaxWidth: 649px;
      --desktopMinWidth: calc(var(--mobileMaxWidth) + 1px);
      --contentMinWidth: 360px; /*Samsung Galaxy S8+*/

      /* theme variable */
      --navBarBGColor: wheat;
      --navBarColor: black;
      --BGColor: white;
      --color: black;
      --linkColor: blue;
    }

    .a_link {
      color: var(--linkColor) !important;
    }

    body {
      max-width: 100vw;
      font-family: "Poppins", sans-serif;
      background-color: darkgrey;
      background-image: url('./v2/img/codingblack.gif');
    }

    .wrapper_content {
      padding-top: var(--navBarHeight);
      margin: auto;
      min-width: var(--contentMinWidth);
      max-width: var(--navBarElementMaxWidth);
      min-height: 100vh;

      background-color: var(--BGColor);
      color: var(--color);
    }

    /* Mobile First */
    @media only screen and (max-width: 649px) {
      body {
        background-repeat: repeat;
        background-size: cover;
      }
    }

    /* Desktop Later */
    @media only screen and (min-width: 650px) {
      body {
        background-repeat: no-repeat;
        background-size: 100% 100%;
        background-attachment: fixed;
      }

      .hide_on_desktop {
        display: none;
      }
    }
  </style>
